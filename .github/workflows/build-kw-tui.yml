name: Build KuiWeaving TUI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.95.0 --profile minimal
      - run: rustup default 1.95.0
      - run: cargo build -p codex-tui --release
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tui-windows
          path: target/release/codex-tui.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y libssl-dev pkg-config
      - run: rustup toolchain install 1.95.0 --profile minimal
      - run: rustup default 1.95.0
      - run: cargo build -p codex-tui --release
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tui-linux
          path: target/release/codex-tui

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.95.0 --profile minimal
      - run: rustup default 1.95.0
      - run: cargo build -p codex-tui --release
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tui-macos
          path: target/release/codex-tui
