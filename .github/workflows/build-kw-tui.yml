name: Build KuiWeaving TUI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582
      - run: sudo apt update && sudo apt install -y libssl-dev pkg-config
      - run: cargo check -p codex-tui --tests
      - run: cargo build -p codex-tui --release
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tui-linux
          path: target/release/codex-tui

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582
      - run: cargo check -p codex-tui --tests
      - run: cargo build -p codex-tui --release
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tui-windows
          path: target/release/codex-tui.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582
      - run: cargo check -p codex-tui --tests
      - run: cargo build -p codex-tui --release
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tui-macos
          path: target/release/codex-tui
